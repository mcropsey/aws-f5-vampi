AWSTemplateFormatVersion: '2010-09-09'
Description: >
  mcropsey Lab — VAmPI + F5 BIG-IP VE
  Correct subnet design: F5 mgmt isolated on 10.0.7.0/24, no overlap with VAmPI (10.0.1.0/24)

# ─── PARAMETERS ──────────────────────────────────────────────────────────────
Parameters:

  MyIP:
    Type: String
    Description: "Your public IP in CIDR notation (e.g. 1.2.3.4/32). Run: curl ifconfig.me"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/32$"
    ConstraintDescription: "Must be a valid IP CIDR ending in /32"

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "Existing EC2 key pair name for SSH access"
    Default: mcropsey-key

  VAmPIInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large]
    Description: "EC2 instance type for VAmPI"

  F5InstanceType:
    Type: String
    Default: m5.xlarge
    AllowedValues: [m5.xlarge, m5.2xlarge]
    Description: "EC2 instance type for F5 BIG-IP (m5.xlarge required for PAYG 25Mbps)"

  F5AMI:
    Type: String
    Description: >
      F5 BIG-IP VE GOOD 25Mbps AMI ID for us-east-2.
      Find it with: aws ec2 describe-images --owners 679593333241
      --filters 'Name=name,Values=*BIGIP*Good*25Mbps*' 'Name=state,Values=available'
      --query 'sort_by(Images,&CreationDate)[-1].ImageId' --output text
    AllowedPattern: "^ami-[a-f0-9]+$"
    ConstraintDescription: "Must be a valid AMI ID"

  VAmPIAMI:
    Type: String
    Default: ami-035032ea878eca201
    Description: "RHEL 9 AMI ID for us-east-2"

# ─── METADATA ────────────────────────────────────────────────────────────────
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Required — fill these in" }
        Parameters: [MyIP, KeyName, F5AMI]
      - Label: { default: "Instance Types" }
        Parameters: [VAmPIInstanceType, F5InstanceType]
      - Label: { default: "AMIs (auto-resolved)" }
        Parameters: [VAmPIAMI]
    ParameterLabels:
      MyIP: { default: "Your Public IP (/32)" }
      KeyName: { default: "EC2 Key Pair" }
      F5AMI: { default: "F5 BIG-IP AMI ID" }

# ─── RESOURCES ───────────────────────────────────────────────────────────────
Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: mcropsey-vpc

  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: mcropsey-igw

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  # ── ROUTE TABLE ────────────────────────────────────────────────────────────
  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: mcropsey-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  # ── SUBNETS ────────────────────────────────────────────────────────────────
  SubnetPublicA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-2a
      Tags:
        - Key: Name
          Value: mcropsey-public-a

  SubnetPrivateA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-east-2a
      Tags:
        - Key: Name
          Value: mcropsey-private-a

  SubnetPrivateB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: us-east-2b
      Tags:
        - Key: Name
          Value: mcropsey-private-b

  SubnetPublicB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: us-east-2b
      Tags:
        - Key: Name
          Value: mcropsey-public-b

  SubnetF5Ext:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.5.0/24
      AvailabilityZone: us-east-2a
      Tags:
        - Key: Name
          Value: mcropsey-f5-ext

  SubnetF5Int:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.6.0/24
      AvailabilityZone: us-east-2a
      Tags:
        - Key: Name
          Value: mcropsey-f5-int

  # CRITICAL: F5 mgmt on its own /24 — NO overlap with VAmPI (10.0.1.0/24)
  SubnetF5Mgmt:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.7.0/24
      AvailabilityZone: us-east-2a
      Tags:
        - Key: Name
          Value: mcropsey-f5-mgmt

  # ── ROUTE TABLE ASSOCIATIONS ───────────────────────────────────────────────
  RTAssocPublicA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetPublicA
      RouteTableId: !Ref PublicRT

  RTAssocPublicB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetPublicB
      RouteTableId: !Ref PublicRT

  RTAssocF5Ext:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetF5Ext
      RouteTableId: !Ref PublicRT

  RTAssocF5Int:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetF5Int
      RouteTableId: !Ref PublicRT

  RTAssocF5Mgmt:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetF5Mgmt
      RouteTableId: !Ref PublicRT

  # ── SECURITY GROUPS ────────────────────────────────────────────────────────
  VAmPISG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-sg
      GroupDescription: VAmPI lab security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # SSH from your workstation
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
        # Direct API access from your workstation
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: !Ref MyIP
        # F5 internal subnet — pool member traffic and health checks
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 10.0.6.0/24
      Tags:
        - Key: Name
          Value: mcropsey-sg

  F5SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-f5-sg
      GroupDescription: F5 BIG-IP VE lab security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # TMUI (HTTPS) from your workstation
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref MyIP
        # SSH from your workstation
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
        # VIP HTTP from your workstation
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref MyIP
      Tags:
        - Key: Name
          Value: mcropsey-f5-sg

  # ── VAmPI EC2 ──────────────────────────────────────────────────────────────
  VAmPIEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: mcropsey-vampi-eip

  VAmPIInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref VAmPIAMI
      InstanceType: !Ref VAmPIInstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetPublicA
      SecurityGroupIds:
        - !Ref VAmPISG
      Tags:
        - Key: Name
          Value: mcropsey-rhel9
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Wait for network
          sleep 15

          # Install podman if not present
          dnf install -y podman 2>/dev/null || true

          # Run VAmPI with --network host (REQUIRED for F5 pool member connectivity)
          # Without --network host, pasta networking drops VPC-to-VPC traffic
          podman run -d \
            --name vampi \
            --network host \
            --restart=always \
            -e vulnerable=1 \
            -e tokentimetolive=300 \
            docker.io/erev0s/vampi:latest

          # Enable podman auto-restart on reboot
          loginctl enable-linger ec2-user 2>/dev/null || true

  VAmPIEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref VAmPIInstance
      AllocationId: !GetAtt VAmPIEIP.AllocationId

  # ── F5 BIG-IP ENIs ─────────────────────────────────────────────────────────
  # eth0 — management ONLY — 10.0.7.0/24 — ISOLATED from VAmPI
  F5ENIMgmt:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetF5Mgmt
      PrivateIpAddress: 10.0.7.20
      GroupSet:
        - !Ref F5SG
      SourceDestCheck: false
      Description: F5 mgmt eth0
      Tags:
        - Key: Name
          Value: mcropsey-f5-mgmt-eni

  # eth1 — external VIP — 10.0.5.0/24
  F5ENIExt:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetF5Ext
      PrivateIpAddress: 10.0.5.10
      GroupSet:
        - !Ref F5SG
      SourceDestCheck: false
      Description: F5 external eth1
      Tags:
        - Key: Name
          Value: mcropsey-f5-ext-eni

  # eth2 — internal pool — 10.0.6.0/24
  F5ENIInt:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetF5Int
      PrivateIpAddress: 10.0.6.10
      GroupSet:
        - !Ref F5SG
      SourceDestCheck: false
      Description: F5 internal eth2
      Tags:
        - Key: Name
          Value: mcropsey-f5-int-eni

  # ── F5 BIG-IP INSTANCE ─────────────────────────────────────────────────────
  F5Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref F5AMI
      InstanceType: !Ref F5InstanceType
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          NetworkInterfaceId: !Ref F5ENIMgmt
        - DeviceIndex: 1
          NetworkInterfaceId: !Ref F5ENIExt
        - DeviceIndex: 2
          NetworkInterfaceId: !Ref F5ENIInt
      Tags:
        - Key: Name
          Value: mcropsey-f5

  # ── F5 ELASTIC IPs ─────────────────────────────────────────────────────────
  F5MgmtEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: mcropsey-f5-mgmt-eip

  F5MgmtEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt F5MgmtEIP.AllocationId
      NetworkInterfaceId: !Ref F5ENIMgmt

  F5VIPEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: mcropsey-f5-vip-eip

  F5VIPEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt F5VIPEIP.AllocationId
      NetworkInterfaceId: !Ref F5ENIExt

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────
Outputs:

  VAmPIPublicIP:
    Description: VAmPI public EIP — direct access
    Value: !Ref VAmPIEIP

  VAmPIPrivateIP:
    Description: VAmPI private IP — use this as the F5 pool member address
    Value: !GetAtt VAmPIInstance.PrivateIp

  VAmPIAPIRoot:
    Description: VAmPI API root (direct)
    Value: !Sub "http://${VAmPIEIP}:5000/"

  VAmPISwagger:
    Description: VAmPI Swagger UI (direct)
    Value: !Sub "http://${VAmPIEIP}:5000/ui/"

  VAmPIInitDB:
    Description: Initialize VAmPI database (direct)
    Value: !Sub "http://${VAmPIEIP}:5000/createdb"

  F5MgmtIP:
    Description: F5 BIG-IP management EIP — SSH and TMUI
    Value: !Ref F5MgmtEIP

  F5TMUI:
    Description: F5 BIG-IP TMUI (web UI)
    Value: !Sub "https://${F5MgmtEIP}/"

  F5VIPEIP:
    Description: F5 VIP public EIP — use for all traffic after F5 is configured
    Value: !Ref F5VIPEIP

  F5SSHCommand:
    Description: SSH command for F5 BIG-IP
    Value: !Sub "ssh -i ~/.ssh/${KeyName}.pem admin@${F5MgmtEIP}"

  VAmPISSHCommand:
    Description: SSH command for VAmPI EC2
    Value: !Sub "ssh -i ~/.ssh/${KeyName}.pem ec2-user@${VAmPIEIP}"

  PoolMemberAddress:
    Description: Use this IP as the F5 pool member address in tmsh
    Value: !Sub "${VAmPIInstance.PrivateIp}:5000"

  NextSteps:
    Description: What to do after stack creation
    Value: !Sub |
      1. Wait 5-10 min for BIG-IP to boot
      2. SSH to F5: ssh -i ~/.ssh/${KeyName}.pem admin@${F5MgmtEIP}
      3. Set password: modify auth user admin prompt-for-password
      4. Configure VLANs, self IPs, pool, and virtual server per the lab guide
      5. Pool member address: ${VAmPIInstance.PrivateIp}:5000
